<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Bichinho Virtual AR</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- AR.js -->
<script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
body {
margin: 0;
overflow: hidden;
}

#ui {
position: fixed;
bottom: 20px;
left: 50%;
transform: translateX(-50%);
z-index: 999;
}

button {
padding: 12px 18px;
font-size: 16px;
margin: 5px;
border-radius: 10px;
border: none;
background: #ff9800;
color: white;
font-weight: bold;
}
</style>

</head>

<body>

<div id="ui">

<button onclick="alimentar()">🍎 Alimentar</button>
<button onclick="brincar()">🎾 Brincar</button>

</div>

<a-scene
embedded
arjs="sourceType: webcam; debugUIEnabled: false;">

<a-marker preset="hiro">

<!-- Bichinho -->

<a-sphere
id="pet"
position="0 0.5 0"
radius="0.3"
color="orange"
animation="property: rotation;
to: 0 360 0;
loop: true;
dur: 4000">

</a-sphere>

<a-text
id="status"
value="Fome: 50"
position="-1 1 0"
color="black"
scale="1 1 1">

</a-text>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<script>

let fome = 50;

function atualizarStatus() {

document
.querySelector("#status")
.setAttribute(
"value",
"Fome: " + fome
);

}

function alimentar() {

fome -= 10;

if (fome < 0)
fome = 0;

atualizarStatus();

}

function brincar() {

fome += 5;

if (fome > 100)
fome = 100;

atualizarStatus();

}

setInterval(() => {

fome += 1;

if (fome > 100)
fome = 100;

atualizarStatus();

}, 5000);

</script>

</body>
</html>
